<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TokenBBQ</title>
  <link rel="stylesheet" href="./src/styles.css" />
</head>
<body>
  <div id="app">
    <!-- Compact Pill -->
    <div id="compact-view" class="pill">
      <img src="/src/assets/tokenbbq-icon.png" alt="" class="pill-fire" width="30" height="30">
      <div class="pill-rows" id="pill-rows">
        <div class="pill-row" data-source="primary">
          <span class="pill-row-logo" id="pill-row-logo-primary" hidden></span>
          <div class="pill-metrics">
            <div class="pill-metric">
              <span class="pill-metric-value" id="five-hour-compact">—</span>
              <span class="pill-metric-label" id="five-hour-label">5h</span>
            </div>
            <div class="pill-metric">
              <span class="pill-metric-value" id="seven-day-compact">—</span>
              <span class="pill-metric-label" id="seven-day-label">7d</span>
            </div>
          </div>
        </div>
        <div class="pill-row" data-source="secondary" hidden id="pill-row-secondary">
          <span class="pill-row-logo" id="pill-row-logo-secondary" hidden></span>
          <div class="pill-metrics">
            <div class="pill-metric">
              <span class="pill-metric-value" id="five-hour-compact-2">—</span>
              <span class="pill-metric-label" id="five-hour-label-2">5h</span>
            </div>
            <div class="pill-metric">
              <span class="pill-metric-value" id="seven-day-compact-2">—</span>
              <span class="pill-metric-label" id="seven-day-label-2">7d</span>
            </div>
          </div>
        </div>
      </div>
      <div class="pill-divider" id="pill-divider" hidden></div>
      <div class="pill-metrics pill-metrics-local" id="pill-local" hidden>
        <div class="pill-metric">
          <span class="pill-metric-value" id="today-compact">—</span>
          <span class="pill-metric-label">today</span>
        </div>
      </div>
      <div class="grip-handle" id="pill-grip" title="Drag to move">
        <span></span><span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>

    <!-- Expanded Panel -->
    <div id="expanded-view" class="panel">
      <div class="titlebar">
        <div class="titlebar-left">
          <img src="/src/assets/tokenbbq-icon.png" alt="" class="titlebar-fire" width="24" height="24">
          <span class="titlebar-name">TokenBBQ</span>
        </div>
        <div class="titlebar-actions">
          <div class="status-dot"></div>
          <button class="titlebar-btn" id="btn-settings" title="Settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
          <button class="titlebar-btn" id="btn-refresh" title="Refresh">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1.5 8a6.5 6.5 0 1 1 1 3.5"/><path d="M1 5v3.5H4.5"/></svg>
          </button>
          <button class="titlebar-btn" id="btn-minimize" title="Minimize">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 8h10"/></svg>
          </button>
          <button class="titlebar-btn close" id="btn-close" title="Close to tray">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4l8 8M12 4l-8 8"/></svg>
          </button>
        </div>
      </div>

      <div class="usage-body" id="usage-bars">
        <!-- Populated by ui.ts -->
      </div>

      <!-- Onboarding hint: shown the first two times the panel opens, then never again. -->
      <div id="dblclick-hint" class="hint-toast" hidden>
        <span class="hint-dot" aria-hidden="true"></span>
        <span class="hint-text">Double-click to minimize</span>
      </div>

      <!-- Settings Overlay -->
      <div class="settings-overlay" id="settings-overlay">
        <div class="titlebar">
          <div class="titlebar-left">
            <span class="titlebar-name">Settings</span>
          </div>
          <div class="titlebar-actions">
            <button class="titlebar-btn close" id="btn-cancel-settings">&#x2715;</button>
          </div>
        </div>
        <div class="settings-content">
          <div class="settings-hint">
            <strong>Setup (one time):</strong>
            <ol>
              <li>Open <code>claude.ai</code> in your browser</li>
              <li>Open DevTools — <code>F12</code> (Windows) or <code>⌥⌘I</code> (Mac)</li>
              <li>Go to <strong>Application</strong> or <strong>Storage</strong> &rarr; <strong>Cookies</strong></li>
              <li>Copy the <code>sessionKey</code> value and paste below</li>
            </ol>
          </div>

          <div id="import-status" class="import-status"></div>

          <div class="field-group">
            <label class="field-label" for="session-key-input">Session Key</label>
            <div class="field-input-wrap">
              <input type="password" class="field-input" id="session-key-input" placeholder="sk-ant-sid02-..." autocomplete="off" spellcheck="false" />
              <button class="toggle-vis" title="Show/Hide">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z"/><circle cx="8" cy="8" r="2"/></svg>
              </button>
            </div>
          </div>
          <div class="field-group">
            <label class="field-label" for="org-id-input">Org ID <span style="color:var(--text-tertiary)">(auto-detected)</span></label>
            <div class="field-input-wrap">
              <input type="text" class="field-input" id="org-id-input" placeholder="leave empty" autocomplete="off" spellcheck="false" />
            </div>
          </div>

          <div class="theme-toggle-row">
            <label class="field-label">Autostart</label>
            <div class="theme-switch-wrap">
              <label class="theme-switch">
                <input type="checkbox" id="autostart-toggle" />
                <span class="theme-slider"></span>
              </label>
            </div>
          </div>

          <div class="theme-toggle-row">
            <label class="field-label">Theme</label>
            <div class="theme-switch-wrap">
              <span class="theme-label" id="theme-label-dark">Dark</span>
              <label class="theme-switch">
                <input type="checkbox" id="theme-toggle" />
                <span class="theme-slider"></span>
              </label>
              <span class="theme-label" id="theme-label-light">Light</span>
            </div>
          </div>
        </div>

        <div class="settings-footer">
          <button class="footer-btn" id="btn-cancel-settings-2">Cancel</button>
          <button class="footer-btn primary" id="btn-save-settings">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
