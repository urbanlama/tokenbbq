name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish-cli:
    name: Publish CLI to npm + create Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  build-widget:
    name: Build widget installer + attach to Release
    needs: publish-cli
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
          - platform: macos-14
            rust_target: aarch64-apple-darwin
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: widget/src-tauri

      - name: Install root deps
        run: npm ci

      - name: Build CLI dist
        run: npm run build

      - name: Compile sidecar binary (Bun)
        run: npm run build:sidecar

      - name: Install widget deps
        run: npm ci
        working-directory: widget

      # tauri-action runs `tauri build` and uploads the produced installers
      # to the existing Release matching the tag:
      #   Windows → NSIS .exe + MSI
      #   macOS   → .dmg + .app (unsigned; first launch needs right-click → Open)
      - name: Build & upload Tauri installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: widget
          tagName: ${{ github.ref_name }}
          releaseId: ${{ needs.publish-cli.outputs.release_id }}
          args: --target ${{ matrix.rust_target }}
